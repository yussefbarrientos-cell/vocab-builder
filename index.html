<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Vocab Audio Engine</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: '#0b57d0',
            brandHover: '#0a45b4',
            brandContainer: '#d3e3fd',
            brandOnContainer: '#041e49',
            surfaceContainer: '#f0f4f9',
            strokeDefault: '#dcdfe5',
            onSurfaceDeEmphasis: '#444746',
            onSurfaceDefault: '#1b1c1d'
          }
        }
      }
    }
  </script>

  <style>
    body {
      touch-action: manipulation; /* Eliminates the mobile double-tap zoom delay */
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .animate-shake {
      animation: shake 0.15s ease-in-out 2;
    }
    @keyframes bounce-subtle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .bounce-1 { animation: bounce-subtle 0.8s infinite 0s; }
    .bounce-2 { animation: bounce-subtle 0.8s infinite 0.15s; }
    .bounce-3 { animation: bounce-subtle 0.8s infinite 0.3s; }
  </style>
</head>
<body class="bg-[#f8f9fa] text-onSurfaceDefault flex flex-col justify-between min-h-screen p-4 md:p-6 select-none">

      <div class="flex gap-1.5 bg-slate-200/60 p-1 rounded-xl border border-strokeDefault">
        <button onclick="changeInterval(5)" id="btn-5" class="px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50">5s</button>
        <button onclick="changeInterval(10)" id="btn-10" class="px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50">10s</button>
        <button onclick="changeInterval(15)" id="btn-15" class="px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50 bg-white shadow-sm text-brand">15s</button>
        <button onclick="changeInterval(30)" id="btn-30" class="px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50">30s</button>
        <button onclick="togglePause()" id="btn-pause" class="px-3 py-1 text-xs font-bold rounded-lg transition-all bg-amber-100 border border-amber-300 text-amber-800 flex items-center gap-1">
          <span class="material-icons text-xs">pause</span><span>Pause</span>
        </button>
      </div>
    </section>

    <main id="card-trigger" class="flex-grow flex flex-col justify-center items-center my-6 bg-white rounded-3xl p-6 border-2 border-strokeDefault hover:border-brand active:scale-[0.99] transition-all shadow-md cursor-pointer relative min-h-[280px]">
      <div class="absolute top-4 text-center">
        <span class="text-slate-400 text-[10px] font-extrabold uppercase tracking-widest bg-surfaceContainer px-3 py-1 rounded-full">Tap Card to Hear Audio</span>
      </div>

      <div class="text-center my-auto flex flex-col items-center">
        <!-- Speech Equalizer Waveform Indicator -->
        <div id="waveform" class="flex gap-1 items-center justify-center h-6 mb-3 transition-opacity duration-300 opacity-0">
          <div class="w-1 bg-brand rounded-full h-3 bounce-1"></div>
          <div class="w-1 bg-brand rounded-full h-5 bounce-2"></div>
          <div class="w-1 bg-brand rounded-full h-3 bounce-3"></div>
        </div>
        
        <h2 id="current-word" class="text-4xl font-extrabold text-brand tracking-tight mb-1">Loading...</h2>

        <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">

  <script>
    let state = {
      currentIndex: 0,
      words: [...vocabData],
      intervalSeconds: 15, // Default is exactly 15 seconds
      isPaused: false,
      secondsLeft: 15,
      timer: null,
      cooldownActive: false,
      speechDelayTimeout: null
    };

    // DOM bindings
    const wordEl = document.getElementById('current-word');
    const posEl = document.getElementById('part-of-speech');
    const defEl = document.getElementById('word-definition');
    const progressEl = document.getElementById('progress-bar');
    const countdownBarEl = document.getElementById('countdown-bar');
    const pacerTextEl = document.getElementById('pacer-text');
    const counterEl = document.getElementById('counter');
    const cardTrigger = document.getElementById('card-trigger');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function speakCurrentWord() {
      if (!('speechSynthesis' in window)) return;

      // Force-cancel ongoing system queues immediately 
      window.speechSynthesis.cancel();
      clearTimeout(state.speechDelayTimeout);

      // 150ms buffer to fully flush OS speech pipelines before starting new stream
      state.speechDelayTimeout = setTimeout(() => {
        try {
          const current = state.words[state.currentIndex];
          const query = current.spokenOverride || current.word;
          const utterance = new SpeechSynthesisUtterance(query);

          utterance.rate = 0.85; // Natural speed for repeat loops
          utterance.pitch = 1.0;
          utterance.lang = 'en-US';

          // Bind equalizer waveform visualization to active audio states
          utterance.onstart = () => {
            document.getElementById('waveform').style.opacity = '1';
          };
          utterance.onend = () => {
            document.getElementById('waveform').style.opacity = '0';
          };
          utterance.onerror = () => {
            document.getElementById('waveform').style.opacity = '0';
          };

          // Wake up Chromium audio context if temporarily asleep
          if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }

          window.speechSynthesis.speak(utterance);
        } catch (err) {
          console.warn("Speech Synthesis threw an error:", err);
        }
      }, 150);
    }

    function triggerFrictionLock(element) {
      if (!element) return;
      element.classList.add('animate-shake', 'border-red-500', 'bg-red-50');
      setTimeout(() => {
        element.classList.remove('animate-shake', 'border-red-500', 'bg-red-50');
      }, 400);
    }

    function canInteract(element) {
      if (state.cooldownActive) {
        triggerFrictionLock(element);
        return false;
      }
      
      // Implement a 1200ms lock-out timer
      state.cooldownActive = true;
      setTimeout(() => {
        state.cooldownActive = false;
      }, 1200);

      return true;
    }

    function startClock() {
      clearInterval(state.timer);
      if (state.isPaused) {
        countdownBarEl.style.width = '100%';
        pacerTextEl.innerText = `⏱️ Countdown paused`;
        return;
      }

      state.secondsLeft = state.intervalSeconds;
      updateClockDisplay();

      state.timer = setInterval(() => {
        state.secondsLeft--;
        updateClockDisplay();

        if (state.secondsLeft <= 0) {
          clearInterval(state.timer);
          autoAdvance();
        }
      }, 1000);
    }

    function updateClockDisplay() {
      // Dynamic visual width scale mapping remaining time
      const percentLeft = (state.secondsLeft / state.intervalSeconds) * 100;
      countdownBarEl.style.width = `${percentLeft}%`;
      pacerTextEl.innerText = `⏱️ Next word in ${state.secondsLeft}s`;
    }

    function renderWord() {
      const current = state.words[state.currentIndex];
      wordEl.innerText = current.word;
      posEl.innerText = current.partOfSpeech;
      defEl.innerText = current.definition;

      // Lock previous buttons if the user is on Word #1
      prevBtn.disabled = (state.currentIndex === 0);

      // Progress Metrics Sync
      const overallProgress = ((state.currentIndex + 1) / state.words.length) * 100;
      progressEl.style.width = `${overallProgress}%`;
      counterEl.innerText = `Word ${state.currentIndex + 1} of ${state.words.length}`;

      startClock();
      speakCurrentWord();
    }

    function autoAdvance() {
      if (state.currentIndex < state.words.length - 1) {
        state.currentIndex++;
        renderWord();
      } else {
        showCompletionScreen();
      }
    }

    function advanceWord() {
      if (!canInteract(nextBtn)) return;
      if (state.currentIndex < state.words.length - 1) {
        state.currentIndex++;
        renderWord();
      } else {
        showCompletionScreen();
      }
    }

    function regressWord() {
      if (!canInteract(prevBtn)) return;
      if (state.currentIndex > 0) {
        state.currentIndex--;
        renderWord();
      }
    }

    function changeInterval(seconds) {
      state.intervalSeconds = seconds;
      state.isPaused = false;
      
      // Sync visual selector pill styles
      [5, 10, 15, 30].forEach(sec => {
        const btn = document.getElementById(`btn-${sec}`);
        if (sec === seconds) {
          btn.className = "px-3 py-1 text-xs font-bold rounded-lg transition-all bg-white shadow-sm text-brand border border-slate-300";
        } else {
          btn.className = "px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50";
        }
      });

      const pauseBtn = document.getElementById('btn-pause');
      pauseBtn.className = "px-3 py-1 text-xs font-bold rounded-lg transition-all bg-slate-200/50 hover:bg-white/50 text-onSurfaceDeEmphasis flex items-center gap-1";
      pauseBtn.innerHTML = `<span class="material-icons text-xs">pause</span><span>Pause</span>`;

      startClock();
    }

    function togglePause() {
      state.isPaused = !state.isPaused;
      const pauseBtn = document.getElementById('btn-pause');

      if (state.isPaused) {
        clearInterval(state.timer);
        pauseBtn.className = "px-3 py-1 text-xs font-bold rounded-lg transition-all bg-emerald-100 border border-emerald-300 text-emerald-800 flex items-center gap-1";
        pauseBtn.innerHTML = `<span class="material-icons text-xs">play_arrow</span><span>Resume</span>`;
        
        // Remove focus styling from active timers
        [5, 10, 15, 30].forEach(sec => {
          document.getElementById(`btn-${sec}`).className = "px-3 py-1 text-xs font-bold rounded-lg transition-all text-onSurfaceDeEmphasis hover:bg-white/50";
        });
        
        countdownBarEl.style.width = '100%';
        pacerTextEl.innerText = `⏱️ Countdown paused`;
      } else {
        // Fallback default back to 15s if resume is triggered
        changeInterval(15);
      }
    }

    function showCompletionScreen() {
      clearInterval(state.timer);
      window.speechSynthesis.cancel();
      
      cardTrigger.innerHTML = `
        <div class="text-brand text-5xl mb-4 animate-bounce">🎉</div>
        <h2 class="text-2xl font-black text-brand mb-1">Session Complete!</h2>
        <p class="text-onSurfaceDeEmphasis text-xs text-center px-6 max-w-xs leading-relaxed">Excellent effort! All 111 academic words processed successfully within the time window.</p>
      `;
      nextBtn.style.display = 'none';
      prevBtn.style.display = 'none';
      document.querySelector('section').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderWord();

      // Card-specific click mapping with internal cooldown verification
      cardTrigger.addEventListener('click', (e) => {
        // Prevent clicking child buttons from double trigger
        if (e.target.closest('button')) return;
        if (canInteract(cardTrigger)) {
          speakCurrentWord();
        }
      });

      prevBtn.addEventListener('click', regressWord);
      nextBtn.addEventListener('click', advanceWord);
    });
  </script>
</body>
</html>
