<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VocabBuilder — TOEFL Vocabulary Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <section id="auth-screen" class="screen active">
      <h1>VocabBuilder</h1>
      <p class="subtitle">111 TOEFL words. Find your gaps. Close them. Bring down the wall.</p>
      <form id="login-form">
        <input type="text" id="student-name" placeholder="Enter your name" required />
        <button type="submit" id="login-btn">Start</button>
      </form>
      <p id="auth-error" class="error"></p>
    </section>

    <section id="grid-screen" class="screen">
      <header>
        <h2>Which words don't you know?</h2>
        <span id="student-label"></span>
        <button id="logout-btn-1" class="link-btn">Switch Student</button>
      </header>
      <p class="instructions">Look at your printed word list. Tap every number whose word you don't know well. Tap again to un-select.</p>
      <div id="number-grid" class="number-grid"></div>
      <p id="grid-count">0 words selected</p>
      <button id="grid-continue" disabled>Continue to Practice</button>
    </section>

    <section id="practice-screen" class="screen">
      <header>
        <span id="module-label"></span>
        <span id="subpage-label"></span>
      </header>
      <div id="activity-container"></div>
      <p id="activity-feedback"></p>
      <button id="confirm-continue" disabled>Confirm & Continue</button>
    </section>

    <section id="module-complete-screen" class="screen">
      <h2 id="module-complete-title"></h2>
      <p id="module-complete-text"></p>
      <button id="module-complete-next">Continue</button>
    </section>

    <section id="wall-screen" class="screen">
      <header>
        <h2>Bring Down the Wall</h2>
        <span id="wall-block-count"></span>
      </header>
      <div id="wall-display" class="wall-display"></div>
      <div id="wall-question-card" class="quiz-card">
        <p id="wall-word"></p>
        <div id="wall-answers"></div>
      </div>
      <p id="wall-feedback"></p>
    </section>

    <section id="win-screen" class="screen">
      <h2>🎉 The Wall Is Down!</h2>
      <p id="win-summary"></p>
      <button id="win-restart">Back to Start</button>
    </section>

  </div>

  <script src="js/vocabulary-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
